name: Result CI Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'result/**'
      - '.github/workflows/build-result.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=rsathyavani
            -Dsonar.projectKey=votingapp-result
            -Dsonar.sources=result
            -Dsonar.qualitygate.wait=true
          
      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./result
          file: result/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/votingapp-result:${{ github.run_number }}

      - name: Update image tag
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci-bot@example.com"
          sed -i 's|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/votingapp-result:${{ github.run_number }}|g' k8s-specifications/result-deployment.yaml
          git add k8s-specifications/result-deployment.yaml
          git commit -m "update image tag" && git push
